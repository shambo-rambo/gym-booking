runConfig:
  concurrency: 80
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 10

env:
  - variable: DATABASE_URL
    secret: DATABASE_URL
    availability:
      - RUNTIME

  - variable: DIRECT_URL
    secret: DIRECT_URL
    availability:
      - RUNTIME

  - variable: AUTH_SECRET
    secret: AUTH_SECRET
    availability:
      - BUILD
      - RUNTIME

  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY
    availability:
      - RUNTIME

  - variable: RESEND_FROM_EMAIL
    value: "noreply@simonhamblin.com"
    availability:
      - RUNTIME

  - variable: BUILDING_CODE
    secret: BUILDING_CODE
    availability:
      - RUNTIME

  - variable: CRON_SECRET
    secret: CRON_SECRET
    availability:
      - RUNTIME

  - variable: NEXT_PUBLIC_APP_URL
    value: "https://gym-booking--watertower-gym.asia-southeast1.hosted.app"
    availability:
      - BUILD
      - RUNTIME

  - variable: AUTH_URL
    value: "https://gym-booking--watertower-gym.asia-southeast1.hosted.app"
    availability:
      - RUNTIME

  - variable: GOOGLE_CLIENT_ID
    secret: GOOGLE_CLIENT_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: GOOGLE_CLIENT_SECRET
    secret: GOOGLE_CLIENT_SECRET
    availability:
      - RUNTIME

  - variable: CLICKSEND_USERNAME
    secret: CLICKSEND_USERNAME
    availability:
      - RUNTIME

  - variable: CLICKSEND_API_KEY
    secret: CLICKSEND_API_KEY
    availability:
      - RUNTIME

  # CLICKSEND_SENDER_ID intentionally omitted — optional, unset means ClickSend's default sender.
  # Add back with a `value:` (or `secret:`) once a Sender ID is actually registered.

  - variable: VAPID_PRIVATE_KEY
    secret: VAPID_PRIVATE_KEY
    availability:
      - RUNTIME

  - variable: VAPID_SUBJECT
    value: "mailto:simon.hamblin@gmail.com"
    availability:
      - RUNTIME

  - variable: NEXT_PUBLIC_VAPID_PUBLIC_KEY
    value: "BFPyuGzL3DuNE3FlzdrIZojcZEhZ_ikNGz6MxXGq0IXthLZMC_mWSDadtq8Z1Sb3n-Ym359WfKCyQXsCt4-fUSw"
    availability:
      - BUILD
      - RUNTIME
