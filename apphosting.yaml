runConfig:
  concurrency: 80
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 10

env:
  - variable: DATABASE_URL
    secret: DATABASE_URL
    availability:
      - RUNTIME

  - variable: DIRECT_URL
    secret: DIRECT_URL
    availability:
      - RUNTIME

  - variable: AUTH_SECRET
    secret: AUTH_SECRET
    availability:
      - BUILD
      - RUNTIME

  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY
    availability:
      - RUNTIME

  - variable: RESEND_FROM_EMAIL
    value: "noreply@simonhamblin.com"
    availability:
      - RUNTIME

  - variable: BUILDING_CODE
    secret: BUILDING_CODE
    availability:
      - RUNTIME

  - variable: CRON_SECRET
    secret: CRON_SECRET
    availability:
      - RUNTIME

  - variable: NEXT_PUBLIC_APP_URL
    value: "https://gym-booking--watertower-gym.asia-southeast1.hosted.app"
    availability:
      - BUILD
      - RUNTIME

  - variable: AUTH_URL
    value: "https://gym-booking--watertower-gym.asia-southeast1.hosted.app"
    availability:
      - RUNTIME

  # Twilio (SMS) — skipped for now, app uses email only
  # Uncomment and add secrets when ready to enable SMS
